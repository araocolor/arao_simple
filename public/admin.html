<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Login -->
  <div class="login-wrapper" id="login-page">
    <div class="login-box">
      <a href="/" class="back-home">← Home</a>
      <h1>Admin</h1>
      <p class="subtitle">Sign in to manage your content</p>
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn">Sign In</button>
        <div class="error-msg" id="login-error" style="display:none;"></div>
      </form>
    </div>
  </div>

  <!-- Admin Panel -->
  <div class="admin-wrapper" id="admin-page" style="display:none;">
    <div class="admin-header">
      <h1>Admin Panel</h1>
      <button class="logout-btn" id="logout-btn">Logout</button>
    </div>
    <div class="admin-content">
      <h2>Sections</h2>
      <div id="editors-container"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    initAdmin();
  </script>
</body>
</html>
